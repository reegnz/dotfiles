# ─── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-a

# ─── Core settings ────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g detach-on-destroy off
set-option -g set-titles on
set-option -g set-titles-string "#{session_name}"

# ─── Terminal colors ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ─── Splits & new windows anchor to the window's worktree root ────────────────
# tmux has no per-window cwd, only a per-session one. ai.window.sh stashes each
# window's worktree path in the window-scoped @window_root option; bindings read
# it and fall back to the active pane's path when unset (non-worktree windows).
bind c   new-window   -a -c "#{?@window_root,#{@window_root},#{pane_current_path}}"
bind '"' split-window -v -c "#{?@window_root,#{@window_root},#{pane_current_path}}"
bind %   split-window -h -c "#{?@window_root,#{@window_root},#{pane_current_path}}"
bind |   split-window -h -c "#{?@window_root,#{@window_root},#{pane_current_path}}"
bind -   split-window -v -c "#{?@window_root,#{@window_root},#{pane_current_path}}"

# ─── Session picker (tmuxifier + fzf-tmux) ───────────────────────────────────
bind t run-shell "~/.config/tmux/scripts/tmux-picker.sh"

# ─── Integrate with zoxide ────────────────────────────────────────────────────
# increase frecency when session belonging to dir is picked
set-hook -g client-session-changed 'run-shell "zoxide add #{session_path}"'
# Increase frecency when windows in the session are being switched between.
# In my setup a window tends to map to a git worktree so it makes sense bump it's frecency.
# The more branches I work in the more important the session dir.
set-hook -g session-window-changed 'run-shell "zoxide add #{session_path}"'

# ─── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'reegnz/ai-tmux'

# ─── Plugin config ────────────────────────────────────────────────────────────
set -g @tmux-gruvbox 'dark256'

set -g @tmux_navigator_disable_when_zoomed "1"

# restore nvim sessions using persistence.nvim session files
set -g @resurrect-strategy-nvim 'session'
#
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
