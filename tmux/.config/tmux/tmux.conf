# ─── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Core settings ────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g detach-on-destroy off
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set-option -g set-titles on
set-option -g set-titles-string "#{session_name}"

# ─── Terminal colors ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ─── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# ─── New windows preserve cwd (pain-control handles splits) ───────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Session picker (tmuxifier + fzf-tmux) ───────────────────────────────────
bind T run-shell "~/.config/tmux/scripts/tmux-picker.sh"
bind v run-shell "~/.config/tmux/scripts/claude-picker.sh"

# ─── Claude Code ──────────────────────────────────────────────────────────────
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=green]#[bold]▶ ,#[fg=default]}#{?@claude_status_icon,#{@claude_status_icon} ,}#P: #{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}} #{?pane_synchronized,#[fg=yellow]🔗,}"
bind s choose-tree -sZ -F "#{?#{@claude_status_icon},#{@claude_status_icon},  }#{window_name} - #{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}}"
bind w choose-tree -wZ -F "#{?#{@claude_status_icon},#{@claude_status_icon},  }#{window_name} - #{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}}"

set -g @resurrect-processes '~claude->claude --continue'

# ─── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'jimeh/tmuxifier'

# ─── Plugin config ────────────────────────────────────────────────────────────
set -g @tmux-gruvbox 'dark256'

set -g @tmux_navigator_disable_when_zoomed "1"

# restore nvim sessions using persistence.nvim session files
set -g @resurrect-strategy-nvim 'session'

set -g @continuum-save-interval '10'
# set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
